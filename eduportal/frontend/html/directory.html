<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Explore Institutions | EduPortal South Sudan</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/html/directory.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="/static/sidebar.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body data-page="directory">
  <div class="dashboard">
    <nav class="sidebar"></nav>

    <header class="top-banner">
      <div>
        <p class="eyebrow">Explore Institutions</p>
        <h1>Find schools by state, level, and county.</h1>
      </div>
      <div class="top-banner-actions"></div>
    </header>

    <main class="main-content">
      <section class="toolbar-card card">
        <form id="school-search-form" class="filter-row">
          <input name="search" type="search" placeholder="Search school name or county">
          <select name="state" title="Filter by state"><option value="">All states</option><option>Central Equatoria</option><option>Eastern Equatoria</option><option>Jonglei</option><option>Lakes</option><option>Northern Bahr el Ghazal</option><option>Unity</option><option>Upper Nile</option><option>Warrap</option><option>Western Bahr el Ghazal</option><option>Western Equatoria</option></select>
          <select name="level" title="Filter by level"><option value="">All levels</option><option value="primary">Primary</option><option value="secondary">Secondary</option></select>
          <select name="type" title="Filter by type"><option value="">Boys, Girls &amp; Mixed</option><option value="boys">Boys only</option><option value="girls">Girls only</option><option value="mixed">Mixed</option></select>
          <select name="boarding" title="Filter by boarding"><option value="">Day &amp; Boarding</option><option value="Day">Day</option><option value="Boarding">Boarding</option></select>
          <button class="card-button" type="submit">Search</button>
        </form>
      </section>

      <!-- Swapped: detail panel LEFT, cards list RIGHT -->
      <section class="directory-layout directory-layout-reversed">
        <aside class="directory-sidebar card">
          <div class="toolbar-card-inner">
            <p class="eyebrow">Institution profile</p>
            <h2>Details stay inside the portal</h2>
            <p class="section-copy">Click a school on the right to load the profile, contact details, and admission checklist here.</p>
          </div>
          <div id="school-detail" class="detail-panel"></div>
          <div class="toolbar-card-inner">
            <p class="eyebrow">Admission checklist</p>
            <h2>Required documents</h2>
          </div>
          <div id="school-requirements" class="checklist"></div>
        </aside>
        <div class="directory-main">
          <section id="directory-results" class="cards-grid results-grid"></section>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
