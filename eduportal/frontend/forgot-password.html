<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | EduPortal South Sudan</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/app.js"></script>
</head>
<body class="auth-page">
  <main class="login-container">

    <section class="left-panel" aria-hidden="true">
      <div class="left-panel-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <div class="left-panel-overlay">
        <div class="hero-badge">
          <span class="hero-badge-dot"></span>
          Password Reset
        </div>
        <h1>Regain access to your account.</h1>
        <p>Enter your phone number or email and we will send you a reset code.</p>
      </div>
    </section>

    <section class="right-panel">
      <div class="auth-card">

        <a class="brand-row" href="/">
          <svg class="brand-logo" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="12" fill="#551010"/>
            <path d="M8 20l12-8 12 8-12 8-12-8z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M14 22v5l6 3 6-3v-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-text">EduPortal South Sudan</span>
        </a>

        <div class="auth-card-header">
          <div>
            <h2>Reset password</h2>
            <p class="auth-subtitle">Enter your registered phone or email</p>
          </div>
          <a class="create-link" href="/">Back to sign in</a>
        </div>

        <!-- Step 1: request reset -->
        <div id="step-request">
          <form id="forgot-form" class="auth-form" novalidate>
            <label class="field">
              <span>Phone number or email</span>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M2.5 6l7.5 5 7.5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input type="text" name="identifier" placeholder="e.g. +211 912 000 000" required autocomplete="username">
              </div>
            </label>
            <button class="login-button" type="submit">
              <span>Send reset code</span>
              <svg viewBox="0 0 20 20" fill="none" width="17" height="17" aria-hidden="true">
                <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <p id="forgot-message" class="status-message" role="alert"></p>
          </form>
        </div>

        <!-- Step 2: enter code + new password -->
        <div id="step-reset" class="hidden">
          <form id="reset-form" class="auth-form" novalidate>
            <input type="hidden" name="user_id" id="reset-user-id">
            <label class="field">
              <span>Reset code</span>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input type="text" name="token" id="reset-token-input" placeholder="Paste the code from your email or SMS" required autocomplete="off">
              </div>
            </label>
            <label class="field">
              <span>New password</span>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input type="password" name="new_password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
              </div>
            </label>
            <label class="field">
              <span>Confirm new password</span>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input type="password" name="confirm_password" placeholder="Repeat new password" required autocomplete="new-password">
              </div>
            </label>
            <button class="login-button" type="submit">
              <span>Set new password</span>
              <svg viewBox="0 0 20 20" fill="none" width="17" height="17" aria-hidden="true">
                <path d="M4 10l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <p id="reset-message" class="status-message" role="alert"></p>
          </form>
        </div>

      </div>
    </section>

  </main>
</body>
</html>
