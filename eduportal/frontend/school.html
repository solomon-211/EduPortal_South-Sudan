<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>School Profile | EduPortal South Sudan</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="/static/sidebar.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body data-page="school">
  <div class="dashboard">
    <nav class="sidebar"></nav>

    <header class="top-banner">
      <div>
        <p class="eyebrow">School Profile</p>
        <h1>Details and admission checklist.</h1>
      </div>
      <div class="top-banner-actions">
        <a class="banner-link" href="/directory">Directory</a>
        <a class="banner-link banner-link-solid" href="/dashboard">Dashboard</a>
      </div>
    </header>

    <main class="main-content" id="school-shell">
      <section class="card content-panel school-profile-card">
        <div id="school-detail">
          <p class="school-loading">Loading school profile…</p>
        </div>
      </section>

      <section class="card content-panel">
        <p class="section-label">ADMISSION CHECKLIST</p>
        <p class="school-note">Required documents to bring when applying.</p>
        <div id="school-checklist"></div>
      </section>
    </main>
  </div>
</body>
</html>
