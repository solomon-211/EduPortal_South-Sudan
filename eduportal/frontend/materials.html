<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learning Resources | EduPortal South Sudan</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="/static/sidebar.js"></script>
  <script defer src="/static/app.js"></script>
</head>
<body data-page="materials">
<div class="dashboard">
  <nav class="sidebar"></nav>

  <header class="top-banner">
    <div>
      <p class="eyebrow">Learning Resources</p>
      <h1>Study materials and past papers.</h1>
    </div>
    <div class="top-banner-actions"></div>
  </header>

  <main class="main-content">

    <section class="toolbar-card card">
      <form id="materials-search-form" class="filter-row">
        <input name="search" type="search" placeholder="Search by title or subject&hellip;">
        <select name="type" title="Filter by type">
          <option value="">All types</option>
          <option value="past paper">Past Papers</option>
          <option value="study guide">Study Guides</option>
          <option value="teacher note">Teacher Notes</option>
        </select>
        <select name="subject" title="Filter by subject">
          <option value="">All subjects</option>
          <option>Mathematics</option><option>English</option>
          <option>Science</option><option>Social Studies</option>
        </select>
        <select name="grade" title="Filter by grade">
          <option value="">All grades</option>
          <option>P1</option><option>P2</option><option>P3</option><option>P4</option>
          <option>P5</option><option>P6</option><option>P7</option><option>P8</option>
          <option>S1</option><option>S2</option><option>S3</option>
          <option>S4</option><option>S5</option><option>S6</option>
        </select>
        <select name="year" title="Filter by year">
          <option value="">All years</option>
          <option>2024</option><option>2023</option><option>2022</option><option>2021</option>
        </select>
        <button class="card-button" type="submit">Filter</button>
      </form>
    </section>

    <!-- Upload form — shown to teachers / school_admin / admin via JS -->
    <section id="upload-material-section" class="content-panel hidden" style="margin-bottom:1.2rem">
      <p class="section-label" style="margin:0 0 1rem">UPLOAD A RESOURCE</p>
      <form id="upload-material-form" class="post-form-grid">
        <div class="post-form-row-2">
          <label class="field"><span>Title</span><input type="text" name="title" placeholder="Resource title" required></label>
          <label class="field"><span>Subject</span>
            <select name="subject">
              <option value="Mathematics">Mathematics</option><option value="English">English</option>
              <option value="Science">Science</option><option value="Social Studies">Social Studies</option>
            </select>
          </label>
        </div>
        <div class="post-form-row-3">
          <label class="field"><span>Grade</span>
            <select name="grade">
              <option>P1</option><option>P2</option><option>P3</option><option>P4</option>
              <option>P5</option><option>P6</option><option>P7</option><option>P8</option>
              <option>S1</option><option>S2</option><option>S3</option>
              <option>S4</option><option>S5</option><option>S6</option>
            </select>
          </label>
          <label class="field"><span>Year</span><input type="number" name="year" placeholder="e.g. 2024" min="2000" max="2099" required></label>
          <label class="field"><span>Type</span>
            <select name="type">
              <option value="past paper">Past Paper</option>
              <option value="study guide">Study Guide</option>
              <option value="teacher note">Teacher Note</option>
            </select>
          </label>
        </div>
        <label class="field" style="margin-bottom:0.5rem">
          <span>PDF file (optional — attach after submission)</span>
          <input type="file" name="file" accept=".pdf" id="material-file-input" style="padding:0.4rem 0">
        </label>
        <button class="card-button" type="submit" style="width:auto;padding:0.7rem 1.6rem;margin-top:0">Submit for admin review</button>
        <p id="upload-material-message" class="status-message"></p>
      </form>
    </section>

    <section class="directory-layout directory-layout-reversed materials-layout">

      <!-- Left: detail panel -->
      <aside class="directory-sidebar card" id="material-detail-panel">
        <div class="toolbar-card-inner">
          <p class="eyebrow">Resource detail</p>
          <h2 id="mat-detail-title" style="font-size:1.1rem;margin:0.3rem 0 0.5rem">Select a resource</h2>
          <p class="section-copy" id="mat-detail-hint">Click any resource on the right to preview it here.</p>
        </div>
        <div id="material-detail" style="padding:0 0.25rem"></div>
      </aside>

      <!-- Right: results list -->
      <div class="directory-main">
        <div class="materials-toolbar">
          <p class="section-label no-margin">Resources</p>
          <div class="mat-view-toggle" aria-label="Switch view">
            <span class="mat-view-label">View</span>
            <button class="mat-view-btn active" id="mat-btn-list" onclick="setMaterialView('list')" title="List view" aria-label="List view">
              <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M5 4h8M5 8h8M5 12h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="2.5" cy="4" r="1" fill="currentColor"/><circle cx="2.5" cy="8" r="1" fill="currentColor"/><circle cx="2.5" cy="12" r="1" fill="currentColor"/></svg>
              List
            </button>
            <button class="mat-view-btn" id="mat-btn-grid" onclick="setMaterialView('grid')" title="Card view" aria-label="Card view">
              <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
              Cards
            </button>
          </div>
        </div>
        <section id="materials-results" class="material-list"></section>
        <div id="materials-pagination"></div>
      </div>

    </section>
  </main>
</div>
</body>
</html>
